name: Update YouTube Song
on:
  schedule:
    - cron: '0 */3 * * *' # 3 മണിക്കൂർ കൂടുമ്പോൾ URL update
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Get YouTube audio URL
        run: |
          yt-dlp -f 91/bestaudio -g "https://youtu.be/3TaRdD3BE5I" > playlist.m3u
          echo "Got URL:"
          head -1 playlist.m3u

      - name: Commit playlist.m3u
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.m3u
          git commit -m "Update song URL" || exit 0
          git push
