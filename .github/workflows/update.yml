name: Update SoundCloud Playlist

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Fetch new URLs
        run: yt-dlp -g --flat-playlist https://on.soundcloud.com/AdZ3SymJAKIzAhwkBs > playlist.m3u

      - name: Commit updated playlist
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto update playlist URLs
          file_pattern: playlist.m3u
