name: Update SoundCloud Playlist
on:
  schedule:
    - cron: '0 */3 * * *' # every 3 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download playlist and extract stream URLs
        run: |
          yt-dlp -g "https://soundcloud.com/playlists/2082249473" > playlist.m3u

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add playlist.m3u
          git commit -m "Update SoundCloud URLs" || echo "No changes"
          git push
