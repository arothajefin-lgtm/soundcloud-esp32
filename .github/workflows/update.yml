name: Update SoundCloud Playlist
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Download playlist and extract stream URLs
        run: |
          set +e
          yt-dlp --ignore-errors --no-warnings -g "https://soundcloud.com/kesterofficial/sets/20-best-christian-devotional" > playlist.m3u
          echo "Total URLs: $(wc -l < playlist.m3u)"
          cat playlist.m3u

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.m3u
          git commit -m "Update SoundCloud URLs" || exit 0
          git push
