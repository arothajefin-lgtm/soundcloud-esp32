name: Update SoundCloud Playlist
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Download playlist and extract stream URLs
        run: |
          set -e
          yt-dlp --no-warnings -g "https://soundcloud.com/playlists/2082249473" > playlist.m3u
          if [! -s playlist.m3u ]; then
            echo "Error: playlist.m3u is empty"
            exit 1
          fi
          echo "Generated playlist:"
          cat playlist.m3u
          echo "Total URLs: $(wc -l < playlist.m3u)"

      - name: Commit and push
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Update SoundCloud URLs"
          git push
