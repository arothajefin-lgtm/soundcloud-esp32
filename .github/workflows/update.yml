name: Update SoundCloud Playlist
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Debug - Test playlist
        run: |
          echo "yt-dlp version:"
          yt-dlp --version
          echo "=== Testing playlist access ==="
          yt-dlp --verbose --dump-single-json "https://soundcloud.com/kesterofficial/sets/20-best-christian-devotional"
          echo "=== Trying to get stream URLs ==="
          yt-dlp -v -g "https://soundcloud.com/kesterofficial/sets/20-best-christian-devotional" > playlist.m3u
          echo "=== Result ==="
          echo "Total URLs: $(wc -l < playlist.m3u)"
          cat playlist.m3u

      - name: Commit and push
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.m3u
          git commit -m "Update SoundCloud URLs" || exit 0
          git push
